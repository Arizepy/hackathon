version: '3.8'

services:
  db:
    image: postgres:16
    container_name: healthaccess-db
    restart: always
    environment:
      POSTGRES_USER: healthlinkgh
      POSTGRES_PASSWORD: healthlinkgh
      POSTGRES_DB: healthlinkgh
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: healthaccess-api
    restart: always
    depends_on:
      - db
    ports:
      - "4000:4000"
    environment:
      - DATABASE_URL=postgresql://healthlinkgh:healthlinkgh@db:5432/healthlinkgh?schema=public
      - JWT_SECRET=replace-with-a-long-random-string-for-security-key
      - CORS_ORIGIN=http://localhost:5173
      - PORT=4000
      - NODE_ENV=production
    command: >
      sh -c "cd server && npx prisma migrate deploy && npx prisma db seed && node dist/index.js"

volumes:
  postgres_data:
